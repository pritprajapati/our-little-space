<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #fff0f3;
            --text-color: #590d22;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden; /* Keeps the moving button from creating scrollbars */
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.1);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        /* Polaroid style photo container */
        .photo-frame {
            display: none;
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transform: rotate(-3deg);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        /* Final Question specific styles */
        .final-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }

        .final-buttons .btn {
            width: auto;
            min-width: 100px;
            margin: 0;
        }

        #yes-btn {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        #no-btn {
            background-color: #8d99ae;
            box-shadow: 0 4px 15px rgba(141, 153, 174, 0.3);
            transition: left 0.2s, top 0.2s; /* Smooth jumping */
        }

        /* Hide all sections initially except the start screen */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="container screen active">
        <h1>Hey beautiful! 💕</h1>
        <p>I made a little something for you. Are you ready for a quick memory check?</p>
        <button class="btn" onclick="startQuiz()">Let's Go!</button>
    </div>

    <div id="quiz-screen" class="container screen">
        
        <div id="photo-container" class="photo-frame">
            <img id="memory-photo" src="" alt="Our Memory">
            <p style="font-size: 1rem; margin-top: 10px; color: #777;">A perfect day.</p>
        </div>

        <h1 id="question-text">Question goes here</h1>
        <div id="options-container" class="options-grid">
            </div>
        <button id="next-btn" class="btn" style="display: none;" onclick="nextQuestion()">Next Question ➡️</button>
    </div>

    <div id="final-screen" class="container screen">
        <h1>You passed! 🎉</h1>
        <p>Okay, time for the most important question of all...</p>
        <h1 style="font-size: 2.5rem; color: var(--primary-color); margin: 30px 0;">Do you love me?</h1>
        
        <div class="final-buttons">
            <button id="yes-btn" class="btn" onclick="triggerYes()">YES!</button>
            <button id="no-btn" class="btn">No</button>
        </div>
    </div>

    <script>
        // --- 1. QUIZ DATA ---
        // You can easily change questions, answers, and image URLs here!
        const quizData = [
            {
                question: "When is my birthday?",
                options: ["October 12th", "November 5th", "Your actual birthday", "December 1st"],
                correctAnswer: 2, // Index of the correct option (0-based)
                photoUrl: "https://images.unsplash.com/photo-1513271249455-27a1420cd156?w=400&q=80" // Replace with your actual photo URL later
            },
            {
                question: "Where did we first meet?",
                options: ["Coffee Shop", "At work", "Through friends", "The exact place"],
                correctAnswer: 3,
                photoUrl: "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=400&q=80"
            }
        ];

        let currentQuestionIndex = 0;

        // --- 2. SCREEN NAVIGATION ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startQuiz() {
            showScreen('quiz-screen');
            loadQuestion();
        }

        // --- 3. QUIZ LOGIC ---
        function loadQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // Clear old options
            optionsContainer.style.display = 'flex'; // Show options
            
            // Hide photo and next button for the new question
            document.getElementById('photo-container').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            const correctIndex = quizData[currentQuestionIndex].correctAnswer;
            
            if (selectedIndex === correctIndex) {
                // Correct!
                btnElement.style.backgroundColor = '#4caf50'; // Green
                btnElement.style.color = 'white';
                btnElement.style.borderColor = '#4caf50';
                
                // Show the photo
                document.getElementById('memory-photo').src = quizData[currentQuestionIndex].photoUrl;
                document.getElementById('photo-container').style.display = 'block';
                
                // Hide options, show Next button
                document.getElementById('options-container').style.display = 'none';
                document.getElementById('next-btn').style.display = 'block';
                
                // Small confetti pop for getting it right
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
            } else {
                // Wrong!
                btnElement.style.backgroundColor = '#ff5252'; // Red
                btnElement.style.color = 'white';
                btnElement.style.borderColor = '#ff5252';
                btnElement.innerText = "Oops, try again! 🙈";
                
                // Shake effect
                btnElement.style.transform = "translateX(-10px)";
                setTimeout(() => btnElement.style.transform = "translateX(10px)", 100);
                setTimeout(() => btnElement.style.transform = "translateX(0)", 200);
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showScreen('final-screen');
            }
        }

        // --- 4. THE BOSS LEVEL (MOVING NO BUTTON) ---
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        let noClickCount = 0;
        const noTexts = ["No", "What? Really?", "Try Again? 🥺", "Last chance!"];

        function moveButton() {
            // Calculate random positions within the viewport, subtracting button dimensions so it doesn't go off-screen
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed'; // Fixed keeps it relative to the screen, not the container
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            noClickCount++;

            // Change text
            if (noClickCount < noTexts.length) {
                noBtn.innerText = noTexts[noClickCount];
            }

            // Grow the YES button
            const currentScale = 1 + (noClickCount * 0.4);
            yesBtn.style.transform = `scale(${currentScale})`;

            // On the 2nd click and onwards, it starts moving
            if (noClickCount >= 2) {
                moveButton();
            }
        });

        // For mobile/desktop: Move away on hover/touch after they've clicked it a couple times
        noBtn.addEventListener('mouseover', function() {
            if (noClickCount >= 2) {
                moveButton();
            }
        });
        noBtn.addEventListener('touchstart', function(e) {
            if (noClickCount >= 2) {
                e.preventDefault(); // Prevent the click from registering before it moves
                moveButton();
            }
        });

        // --- 5. THE FINALE ---
        function triggerYes() {
            // Change the screen content
            const container = document.getElementById('final-screen');
            container.innerHTML = `
                <h1 style="font-size: 3rem;">I knew it! ❤️</h1>
                <p>I love you too!</p>
                <div style="font-size: 5rem;">🥰</div>
            `;

            // Massive Confetti Explosion
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }
    </script>
</body>
</html>
