<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISHA ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Kalam:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="menu-icon">☰</div>
        <div class="title">PRISHA ♡</div>
        <div class="spacer"></div> 
    </header>

    <section class="carousel-container">
        <div class="carousel-track" id="track">
            <img src="photo1.png" alt="Memory 1" class="carousel-img">
            <img src="photo2.jpg" alt="Memory 2" class="carousel-img">
            <img src="photo3.jpg" alt="Memory 3" class="carousel-img">
            <img src="photo4.jpg" alt="Memory 4" class="carousel-img">

    <section class="action-section">
        <p class="spice-text">Spice things up 🔥</p>
        
        <div class="quiz-area">

                <p class="handwritten-text">Try the Quiz?</p>
                <svg class="squiggly-arrow" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,20 C30,-20 60,70 80,30 C85,20 95,25 105,30" fill="none" stroke="#590d22" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M95,20 L105,30 L95,40" fill="none" stroke="#590d22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

            <a href="quiz.html" class="btn-quiz">Quiz</a>

    <div class="construction-bar"></div>

    <footer>
        <p>⚠️ Work in progress</p>
